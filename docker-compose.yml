version: '3.8'
services:
  db:
    image: postgres:16
    container_name: billsplit_db
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: billsplit
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: sa6kok@example.com
      PGADMIN_DEFAULT_PASSWORD: passwordAdmin
    ports:
      - "5050:80"
    depends_on:
      - db
volumes:
  db_data:
